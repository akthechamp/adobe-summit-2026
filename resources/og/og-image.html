<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Forte — OG Image (1200x630)</title>
<style>
  /* Screenshot at 1200x630 for Open Graph */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .og {
    width: 1200px;
    height: 630px;
    background: linear-gradient(145deg, #0A1628 0%, #101E33 50%, #0A1628 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,91,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,91,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .glow-1 {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(91,91,255,0.1) 0%, transparent 70%);
    top: -100px; right: -50px;
  }
  .glow-2 {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,91,91,0.06) 0%, transparent 70%);
    bottom: -100px; left: 50px;
  }

  .center {
    text-align: center;
    position: relative;
    z-index: 10;
  }

  /* Inline SVG icon */
  .icon-wrap {
    margin-bottom: 28px;
  }

  .title {
    font-size: 54px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 20px;
  }
  .title .accent { color: #5B5BFF; }

  .desc {
    font-size: 22px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    max-width: 700px;
    margin: 0 auto 32px;
    line-height: 1.5;
  }

  .tags {
    font-size: 15px;
    font-weight: 600;
    color: rgba(91,91,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .tags .dot {
    color: rgba(255,91,91,0.5);
    margin: 0 10px;
  }

  .url {
    position: absolute;
    bottom: 30px;
    right: 40px;
    font-size: 14px;
    color: rgba(255,255,255,0.25);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="og">
  <div class="grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="center">
    <!-- Icon -->
    <div class="icon-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="9" fill="#5B5BFF"/>
        <circle cx="54" cy="14" r="6" fill="#5B5BFF" opacity="0.7"/>
        <circle cx="56" cy="50" r="5.5" fill="#FF5B5B" opacity="0.8"/>
        <circle cx="10" cy="22" r="5" fill="#5B5BFF" opacity="0.6"/>
        <circle cx="14" cy="54" r="4.5" fill="#5B5BFF" opacity="0.5"/>
        <line x1="32" y1="32" x2="54" y2="14" stroke="#5B5BFF" stroke-width="1.8" opacity="0.4"/>
        <line x1="32" y1="32" x2="56" y2="50" stroke="#FF5B5B" stroke-width="1.8" opacity="0.35"/>
        <line x1="32" y1="32" x2="10" y2="22" stroke="#5B5BFF" stroke-width="1.8" opacity="0.35"/>
        <line x1="32" y1="32" x2="14" y2="54" stroke="#5B5BFF" stroke-width="1.8" opacity="0.3"/>
        <circle cx="32" cy="32" r="4.5" fill="#0A1628"/>
        <circle cx="32" cy="32" r="2.8" fill="#5B5BFF"/>
      </svg>
    </div>

    <h1 class="title">
      <span class="accent">AI</span> Agent Orchestration<br>
      on Adobe Experience Cloud
    </h1>
    <p class="desc">
      We design and ship multi-agent systems. Commerce, Marketo, AEM, Journey Optimizer — coordinated for business outcomes.
    </p>
    <p class="tags">
      Commerce<span class="dot">&bull;</span>Marketo<span class="dot">&bull;</span>AEM<span class="dot">&bull;</span>Agent Orchestrator
    </p>
  </div>

  <span class="url">aiforte.dev</span>
</div>
</body>
</html>
