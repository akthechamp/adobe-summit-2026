  <g transform="translate(10, 8)">
    <circle cx="32" cy="32" r="8" fill="#5B5BFF"/>
    <circle cx="56" cy="12" r="5.5" fill="#5B5BFF" opacity="0.7"/>
    <circle cx="58" cy="52" r="5" fill="#FF5B5B" opacity="0.8"/>
    <circle cx="8" cy="28" r="4.5" fill="#5B5BFF" opacity="0.6"/>
    <circle cx="16" cy="56" r="4" fill="#5B5BFF" opacity="0.5"/>

    <line x1="32" y1="32" x2="56" y2="12" stroke="#5B5BFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="32" x2="58" y2="52" stroke="#FF5B5B" stroke-width="1.5" opacity="0.35"/>
    <line x1="32" y1="32" x2="8" y2="28" stroke="#5B5BFF" stroke-width="1.5" opacity="0.35"/>
    <line x1="32" y1="32" x2="16" y2="56" stroke="#5B5BFF" stroke-width="1.5" opacity="0.3"/>
    <line x1="8" y1="28" x2="16" y2="56" stroke="#5B5BFF" stroke-width="1" opacity="0.2"/>
