<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="accentGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#5B5BFF"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Orchestration Node Network -->
  <g transform="translate(16, 18)">
    <!-- Connection lines -->
    <line x1="42" y1="12" x2="18" y2="48" stroke="#6C5CE7" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="42" y1="12" x2="66" y2="48" stroke="#6C5CE7" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="18" y1="48" x2="66" y2="48" stroke="#6C5CE7" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
    <line x1="42" y1="12" x2="42" y2="72" stroke="#6C5CE7" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
    <line x1="18" y1="48" x2="42" y2="72" stroke="#6C5CE7" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
    <line x1="66" y1="48" x2="42" y2="72" stroke="#6C5CE7" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Nodes -->
    <circle cx="42" cy="12" r="6" fill="url(#accentGradA)"/>
    <circle cx="18" cy="48" r="5" fill="#6C5CE7"/>
    <circle cx="66" cy="48" r="5" fill="#6C5CE7"/>
    <circle cx="42" cy="72" r="4.5" fill="#5B5BFF"/>
    
    <!-- Center orchestrator node -->
    <circle cx="42" cy="40" r="3.5" fill="#FF6B6B" opacity="0.9"/>
  </g>
  
  <!-- Wordmark -->
  <text x="108" y="72" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-2" fill="#0B1426">
    <tspan fill="url(#accentGradA)">AI</tspan><tspan fill="#0B1426" dx="4"> Forte</tspan>
  </text>
</svg>
