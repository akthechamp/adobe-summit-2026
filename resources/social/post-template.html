<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Forte — Social Post Template (1080x1080)</title>
<style>
  /* Screenshot at 1080x1080 for LinkedIn / Instagram square posts */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .post {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(160deg, #0A1628 0%, #0F1D32 50%, #0A1628 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* Network pattern — faded for text overlay */
  .pattern {
    position: absolute;
    inset: 0;
    opacity: 0.06;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,91,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,91,255,0.06) 1px, transparent 1px);
    background-size: 54px 54px;
  }

  .glow-tl {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(91,91,255,0.08) 0%, transparent 70%);
    top: -200px; left: -200px;
  }
  .glow-br {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,91,91,0.05) 0%, transparent 70%);
    bottom: -150px; right: -150px;
  }

  /* Center content area — this is where you overlay your headline */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 80px;
  }

  .headline {
    font-size: 52px;
    font-weight: 800;
    color: #FFFFFF;
    line-height: 1.2;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }
  .headline .accent { color: #5B5BFF; }

  .body-text {
    font-size: 22px;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    max-width: 700px;
    margin: 0 auto;
  }

  /* Logo bottom-center */
  .logo {
    position: absolute;
    bottom: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-text {
    font-size: 20px;
    font-weight: 700;
  }
  .logo-text .ai { color: #5B5BFF; }
  .logo-text .forte { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="post">
  <div class="grid"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="content">
    <!-- EDIT THIS HEADLINE for each post -->
    <h1 class="headline">
      Most AI pilots fail<br>
      because they're<br>
      <span class="accent">point solutions</span>.
    </h1>
    <p class="body-text">
      The difference is orchestration — agents that coordinate across your entire stack, not just one corner of it.
    </p>
  </div>

  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="9" fill="#5B5BFF"/>
      <circle cx="54" cy="14" r="6" fill="#5B5BFF" opacity="0.7"/>
      <circle cx="56" cy="50" r="5.5" fill="#FF5B5B" opacity="0.8"/>
      <circle cx="10" cy="22" r="5" fill="#5B5BFF" opacity="0.6"/>
      <line x1="32" y1="32" x2="54" y2="14" stroke="#5B5BFF" stroke-width="1.8" opacity="0.4"/>
      <line x1="32" y1="32" x2="56" y2="50" stroke="#FF5B5B" stroke-width="1.8" opacity="0.35"/>
      <line x1="32" y1="32" x2="10" y2="22" stroke="#5B5BFF" stroke-width="1.8" opacity="0.35"/>
      <circle cx="32" cy="32" r="4.5" fill="#0A1628"/>
      <circle cx="32" cy="32" r="2.8" fill="#5B5BFF"/>
    </svg>
    <span class="logo-text"><span class="ai">AI</span><span class="forte"> Forte</span></span>
  </div>
</div>
</body>
</html>
