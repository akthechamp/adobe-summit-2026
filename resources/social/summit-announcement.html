<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Forte — Summit 2026 Announcement (1200x628)</title>
<style>
  /* Screenshot at 1200x628 for LinkedIn / Twitter post image */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .card {
    width: 1200px;
    height: 628px;
    background: linear-gradient(145deg, #0A1628 0%, #111D33 60%, #0A1628 100%);
    display: flex;
    position: relative;
    overflow: hidden;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,91,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,91,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Left content */
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 50px 60px 70px;
    position: relative;
    z-index: 10;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(91,91,255,0.1);
    border: 1px solid rgba(91,91,255,0.2);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    color: #5B5BFF;
    width: fit-content;
    margin-bottom: 28px;
  }
  .badge .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #FF5B5B;
  }

  .title {
    font-size: 50px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -1px;
    line-height: 1.12;
    margin-bottom: 20px;
  }
  .title .accent { color: #5B5BFF; }

  .sub {
    font-size: 19px;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
    max-width: 480px;
    margin-bottom: 32px;
  }

  .details {
    display: flex;
    gap: 32px;
  }
  .detail-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .detail-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    font-weight: 600;
  }
  .detail-value {
    font-size: 17px;
    color: #FFFFFF;
    font-weight: 700;
  }

  /* Right — skyline silhouette */
  .right {
    width: 420px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
  }

  /* Vegas skyline SVG silhouette */
  .skyline {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 420px;
    opacity: 0.12;
  }

  /* Network glow */
  .glow {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(91,91,255,0.1) 0%, transparent 70%);
    top: 20%;
    right: 5%;
  }

  /* Logo bottom-left */
  .logo {
    position: absolute;
    bottom: 32px;
    left: 70px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo-text .ai { color: #5B5BFF; }
  .logo-text .forte { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="glow"></div>

  <div class="left">
    <div class="badge">
      <span class="pulse"></span>
      Adobe Summit 2026
    </div>

    <h1 class="title">
      See you in<br>
      <span class="accent">Vegas</span>.
    </h1>

    <p class="sub">
      Let's talk agent orchestration, Commerce, Marketo, and AEM. No deck — just a real conversation about where you're stuck.
    </p>

    <div class="details">
      <div class="detail-item">
        <span class="detail-label">When</span>
        <span class="detail-value">April 19-22, 2026</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Where</span>
        <span class="detail-value">The Venetian, Las Vegas</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Book a Meeting</span>
        <span class="detail-value" style="color: #5B5BFF;">aiforte.dev/adobe-summit</span>
      </div>
    </div>
  </div>

  <!-- Simple Vegas skyline silhouette -->
  <div class="right">
    <svg class="skyline" viewBox="0 0 420 300" fill="white" xmlns="http://www.w3.org/2000/svg">
      <!-- Simplified Vegas-inspired skyline -->
      <rect x="20" y="180" width="30" height="120" rx="2"/>
      <rect x="60" y="120" width="25" height="180" rx="2"/>
      <rect x="95" y="80" width="35" height="220" rx="3"/>
      <!-- Venetian-inspired tower -->
      <rect x="140" y="40" width="40" height="260" rx="3"/>
      <rect x="148" y="20" width="24" height="20" rx="8"/>
      <!-- More buildings -->
      <rect x="190" y="100" width="30" height="200" rx="2"/>
      <rect x="230" y="60" width="28" height="240" rx="2"/>
      <rect x="268" y="130" width="35" height="170" rx="3"/>
      <rect x="313" y="90" width="25" height="210" rx="2"/>
      <rect x="348" y="150" width="30" height="150" rx="2"/>
      <rect x="388" y="170" width="25" height="130" rx="2"/>
    </svg>
  </div>

  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="9" fill="#5B5BFF"/>
      <circle cx="54" cy="14" r="6" fill="#5B5BFF" opacity="0.7"/>
      <circle cx="56" cy="50" r="5.5" fill="#FF5B5B" opacity="0.8"/>
      <circle cx="10" cy="22" r="5" fill="#5B5BFF" opacity="0.6"/>
      <line x1="32" y1="32" x2="54" y2="14" stroke="#5B5BFF" stroke-width="1.8" opacity="0.4"/>
      <line x1="32" y1="32" x2="56" y2="50" stroke="#FF5B5B" stroke-width="1.8" opacity="0.35"/>
      <line x1="32" y1="32" x2="10" y2="22" stroke="#5B5BFF" stroke-width="1.8" opacity="0.35"/>
      <circle cx="32" cy="32" r="4.5" fill="#0A1628"/>
      <circle cx="32" cy="32" r="2.8" fill="#5B5BFF"/>
    </svg>
    <span class="logo-text"><span class="ai">AI</span><span class="forte"> Forte</span></span>
  </div>
</div>
</body>
</html>
